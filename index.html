<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidovate Comic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #canvas-container canvas { display: block; outline: none; }
        .comic-bubble {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            background: white; border: 4px solid black; border-radius: 30px;
            padding: 15px 30px; text-align: center; font-weight: 900;
            color: black; font-size: 1.2rem; text-transform: uppercase;
            box-shadow: 6px 6px 0px rgba(0,0,0,1); z-index: 15;
            max-width: 80%; display: none; word-wrap: break-word;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-black italic text-cyan-400 text-xl tracking-tighter uppercase">KIDOVATE STUDIO</span>
            <div class="flex gap-4 text-xs font-bold uppercase tracking-widest">
                <a href="index.html" class="text-cyan-400 border-b-2 border-cyan-400 pb-1">Studio</a>
                <a href="about.html" class="text-slate-400 hover:text-white transition">About</a>
                <a href="updates.html" class="text-slate-400 hover:text-white transition">Updates</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-5xl mx-auto w-full p-4 md:p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2">
                <div id="capture-area" class="relative bg-slate-900 rounded-3xl overflow-hidden border-4 border-slate-800 shadow-2xl h-[450px] sm:h-[550px]">
                    <div id="speech-bubble" class="comic-bubble"></div>
                    <div id="canvas-container" class="w-full h-full cursor-move"></div>

                    <div id="upload-overlay" class="absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center z-20 p-6 text-center">
                        <div class="text-5xl mb-4">🤖</div>
                        <h2 class="text-2xl font-black text-white uppercase mb-6">Load Your Hero</h2>
                        <input type="file" id="modelUpload" accept=".glb" class="hidden">
                        <label for="modelUpload" class="bg-cyan-600 hover:bg-cyan-500 text-white font-black px-10 py-5 rounded-2xl shadow-xl cursor-pointer active:scale-95 transition-all uppercase tracking-widest">
                            📁 Upload .GLB File
                        </label>
                        <p class="text-slate-500 text-[10px] mt-6 font-bold uppercase">Use the file converted from Mixamo</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl shadow-xl">
                    <h3 class="text-cyan-400 font-bold uppercase text-[10px] mb-3">Dialogue</h3>
                    <textarea id="dialogueInput" rows="2" placeholder="What are they saying?" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-white focus:border-cyan-400 outline-none resize-none"></textarea>
                </div>

                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl shadow-xl mt-auto">
                    <button onclick="takePhoto()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">
                        📸 SAVE PHOTO
                    </button>
                    <p class="text-center text-[10px] text-slate-500 mt-3 font-bold uppercase">#KIDOVATE 2026</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls, model;

        function init() {
            // Setup Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);

            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            camera.position.set(0, 0, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer) renderer.render(scene, camera);
        }

        // File Handler
        document.getElementById('modelUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-overlay').style.display = 'none';
            
            const url = URL.createObjectURL(file);
            const loader = new THREE.GLTFLoader();

            loader.load(url, (gltf) => {
                if (model) scene.remove(model);
                model = gltf.scene;

                // --- SMART SCALE FIX ---
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 4 / maxDim; // Normalize to size 4
                model.scale.set(scale, scale, scale);

                // --- RE-CENTER ---
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                
                scene.add(model);
            });
        });

        // UI Helpers
        document.getElementById('dialogueInput').addEventListener('input', (e) => {
            const bubble = document.getElementById('speech-bubble');
            const text = e.target.value.trim();
            bubble.style.display = text ? 'block' : 'none';
            bubble.innerText = text;
        });

        function takePhoto() {
            const area = document.getElementById('capture-area');
            html2canvas(area).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Kidovate_Comic.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Handle Resizing
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            if (!container || !camera || !renderer) return;
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });

        init();
    </script>
</body>
</html>
