!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidovate Comic Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .comic-bubble {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            background: white; border: 4px solid black; border-radius: 30px;
            padding: 15px 30px; text-align: center; font-weight: 900;
            color: black; font-size: 1.5rem; text-transform: uppercase;
            box-shadow: 8px 8px 0px rgba(0,0,0,1); z-index: 15;
            max-width: 80%; display: none; word-wrap: break-word;
        }
        .comic-bubble::after {
            content: ''; position: absolute; bottom: -20px; left: 50%;
            border-width: 20px 20px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="font-black italic text-cyan-400 text-2xl uppercase tracking-tighter">KIDOVATE STUDIO</span>
            <div class="flex gap-6 font-bold text-xs uppercase tracking-widest">
                <a href="index.html" class="text-cyan-400 border-b-2 border-cyan-400 pb-1">Studio</a>
                <a href="about.html" class="text-slate-400 hover:text-white transition">About</a>
                <a href="updates.html" class="text-slate-400 hover:text-white transition">Updates</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto w-full p-4 md:p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div id="capture-area" class="relative bg-slate-900 rounded-3xl overflow-hidden border-4 border-slate-800 shadow-2xl h-[500px] sm:h-[600px]">
                    <div id="speech-bubble" class="comic-bubble"></div>
                    <div id="canvas-container" class="w-full h-full cursor-move"></div>
                    <div id="upload-overlay" class="absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-20 p-6 text-center">
                        <div class="text-6xl mb-4 animate-bounce">🎬</div>
                        <h2 class="text-3xl font-black text-white uppercase mb-8">Ready for Action?</h2>
                        <input type="file" id="modelUpload" accept=".glb" class="hidden">
                        <label for="modelUpload" class="bg-gradient-to-r from-cyan-600 to-blue-600 text-white font-black px-12 py-6 rounded-2xl shadow-2xl cursor-pointer hover:scale-105 transition-all uppercase tracking-widest">
                            📁 Upload Character (.glb)
                        </label>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl">
                    <h3 class="text-cyan-400 font-bold uppercase text-[10px] mb-3 tracking-widest">1. Dialogue</h3>
                    <textarea id="dialogueInput" rows="2" placeholder="What are they saying?" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500 transition-colors"></textarea>
                </div>

                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl">
                    <h3 class="text-cyan-400 font-bold uppercase text-[10px] mb-3 tracking-widest">2. Set the Scene</h3>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="setBg('color', 0x1e293b)" class="h-10 rounded-lg bg-[#1e293b] border border-slate-600 hover:border-cyan-400 transition-all"></button>
                        <button onclick="setBg('color', 0x065f46)" class="h-10 rounded-lg bg-[#065f46] border border-slate-600 hover:border-cyan-400 transition-all"></button>
                        <button onclick="setBg('image', 'https://images.unsplash.com/photo-1618553255141-86f78f8fc857?q=80&w=800&auto=format&fit=crop')" class="h-10 rounded-lg bg-cover bg-center border border-slate-600 hover:border-cyan-400 transition-all" style="background-image: url('https://images.unsplash.com/photo-1618553255141-86f78f8fc857?q=80&w=100&auto=format&fit=crop')"></button>
                        <button onclick="setBg('image', 'https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800&auto=format&fit=crop')" class="h-10 rounded-lg bg-cover bg-center border border-slate-600 hover:border-cyan-400 transition-all" style="background-image: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=100&auto=format&fit=crop')"></button>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl">
                    <h3 class="text-cyan-400 font-bold uppercase text-[10px] mb-3 tracking-widest">3. Pose Control</h3>
                    <button id="btn-pause" onclick="toggleAnim()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl border border-slate-700 hover:bg-slate-700 transition-all uppercase text-xs tracking-widest">
                        ⏸️ Pause Animation
                    </button>
                </div>

                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl mt-auto shadow-2xl">
                    <button onclick="takePhoto()" id="btn-snap" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-black py-6 rounded-2xl shadow-xl hover:brightness-110 active:scale-95 transition-all uppercase tracking-widest text-lg">
                        📸 SNAP PANEL
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-2xl">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h3 class="text-2xl font-black italic text-white uppercase tracking-tighter">Your Storyboard</h3>
                    <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Snap multiple photos to build a comic strip</p>
                </div>
                <button onclick="downloadStrip()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black px-6 py-3 rounded-xl shadow-lg transition-all uppercase text-xs tracking-widest">
                    📥 Save Full Comic
                </button>
            </div>
            <div class="overflow-x-auto pb-4">
                <div id="comic-strip" class="flex gap-4 min-w-full bg-white p-4 rounded-lg min-h-[200px] items-center">
                    <p id="placeholder-text" class="w-full text-center text-slate-300 font-bold uppercase tracking-widest py-10">No panels snapped yet...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls, model, mixer;
        let clock = new THREE.Clock();
        let isPlaying = true;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 2000);
            camera.position.set(0, 0, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 10, 7);
            scene.add(sun);
            animate();
        }

        document.getElementById('modelUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-overlay').style.display = 'none';
            const url = URL.createObjectURL(file);
            new THREE.GLTFLoader().load(url, (gltf) => {
                if (model) scene.remove(model);
                model = gltf.scene;
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    mixer.clipAction(gltf.animations[0]).play();
                }
                model.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const scale = 5 / Math.max(size.x, size.y, size.z);
                model.scale.set(scale, scale, scale);
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                scene.add(model);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            if (mixer && isPlaying) mixer.update(delta);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        function setBg(type, val) {
            if(type === 'color') scene.background = new THREE.Color(val);
            else new THREE.TextureLoader().load(val, (t) => { t.encoding = THREE.sRGBEncoding; scene.background = t; });
        }

        function toggleAnim() {
            isPlaying = !isPlaying;
            document.getElementById('btn-pause').innerText = isPlaying ? "⏸️ Pause Animation" : "▶️ Play Animation";
        }

        document.getElementById('dialogueInput').addEventListener('input', (e) => {
            const bubble = document.getElementById('speech-bubble');
            bubble.style.display = e.target.value ? 'block' : 'none';
            bubble.innerText = e.target.value;
        });

        function takePhoto() {
            html2canvas(document.getElementById('capture-area'), { useCORS: true }).then(canvas => {
                const placeholder = document.getElementById('placeholder-text');
                if(placeholder) placeholder.remove();
                const img = document.createElement('img');
                img.src = canvas.toDataURL();
                img.className = "h-48 border-4 border-black shadow-lg shrink-0";
                document.getElementById('comic-strip').appendChild(img);
            });
        }

        function downloadStrip() {
            html2canvas(document.getElementById('comic-strip')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'My_Comic_Strip.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        init();
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });
    </script>
</body>
</html>
