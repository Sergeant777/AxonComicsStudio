<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidovate Comic Studio Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        
        /* Comic Speech Bubble */
        .comic-bubble {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            background: white; border: 4px solid black; border-radius: 30px;
            padding: 15px 30px; text-align: center; font-weight: 900;
            color: black; font-size: 1.5rem; text-transform: uppercase;
            box-shadow: 8px 8px 0px rgba(0,0,0,1); z-index: 50;
            max-width: 80%; display: none; word-wrap: break-word;
        }
        .comic-bubble::after {
            content: ''; position: absolute; bottom: -20px; left: 50%;
            border-width: 20px 20px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }

        /* Navigation Styling */
        .nav-link { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.3s; }
        .nav-active { color: #22d3ee; border-bottom: 2px solid #22d3ee; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-[100] shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🤖</span>
                <span class="font-black italic text-cyan-400 text-2xl uppercase tracking-tighter">KIDOVATE STUDIO</span>
            </div>
            <div class="flex gap-6">
                <a href="index.html" class="nav-link nav-active">Studio</a>
                <a href="about.html" class="nav-link text-slate-500 hover:text-white">About</a>
                <a href="updates.html" class="nav-link text-slate-500 hover:text-white">Updates</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto w-full p-4 md:p-8 space-y-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-3">
                <div id="capture-area" class="relative bg-slate-900 rounded-[2.5rem] overflow-hidden border-4 border-slate-800 shadow-2xl h-[500px] md:h-[650px]">
                    <div id="speech-bubble" class="comic-bubble"></div>
                    <div id="canvas-container" class="w-full h-full cursor-grab active:cursor-grabbing"></div>

                    <div id="upload-overlay" class="absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[60] p-10 text-center">
                        <div class="text-6xl mb-6 animate-bounce">🎬</div>
                        <h2 class="text-3xl font-black text-white uppercase mb-4">Action!</h2>
                        <p class="text-slate-400 mb-10 max-w-sm">Upload your <b>.glb</b> character to begin your comic strip.</p>
                        
                        <input type="file" id="modelUpload" accept=".glb" class="hidden">
                        <label for="modelUpload" class="bg-cyan-600 hover:bg-cyan-500 text-white font-black px-12 py-6 rounded-2xl shadow-xl cursor-pointer transition-all uppercase tracking-widest">
                            📁 Select Hero File
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 space-y-6">
                
                <div class="bg-slate-900/80 border border-slate-800 p-6 rounded-3xl shadow-xl">
                    <label class="block text-cyan-400 font-bold uppercase text-[10px] mb-3 tracking-widest">1. Dialogue</label>
                    <textarea id="dialogueInput" rows="2" placeholder="What's happening?" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-cyan-500 transition-all"></textarea>
                </div>

                <div class="bg-slate-900/80 border border-slate-800 p-6 rounded-3xl shadow-xl">
                    <label class="block text-cyan-400 font-bold uppercase text-[10px] mb-3 tracking-widest">2. Background</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="setBg(0x1e293b)" class="h-8 rounded-lg bg-[#1e293b] border border-slate-600 hover:border-cyan-400"></button>
                        <button onclick="setBg(0x064e3b)" class="h-8 rounded-lg bg-[#064e3b] border border-slate-600 hover:border-cyan-400"></button>
                        <button onclick="setBg(0x312e81)" class="h-8 rounded-lg bg-[#312e81] border border-slate-600 hover:border-cyan-400"></button>
                        <button onclick="setBg(0x000000)" class="h-8 rounded-lg bg-black border border-slate-600 hover:border-cyan-400"></button>
                    </div>
                </div>

                <div class="bg-slate-900/80 border border-slate-800 p-6 rounded-3xl shadow-xl">
                    <label class="block text-cyan-400 font-bold uppercase text-[10px] mb-3 tracking-widest">3. Animation</label>
                    <button id="animBtn" onclick="toggleAnim()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl border border-slate-700 uppercase text-[10px] tracking-widest">
                        ⏸️ Pause Motion
                    </button>
                </div>

                <button onclick="takeSnapshot()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-black py-6 rounded-[2rem] shadow-xl hover:brightness-110 active:scale-95 transition-all uppercase tracking-widest text-lg">
                    📸 SNAP PANEL
                </button>

            </div>
        </div>

        <div class="bg-slate-900 border-4 border-slate-800 p-8 rounded-[3rem] shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black italic text-white uppercase tracking-tighter">Your Storyboard</h3>
                <button onclick="downloadStrip()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black px-8 py-3 rounded-xl shadow-lg transition-all uppercase text-[10px] tracking-widest">
                    📥 Save Full Comic
                </button>
            </div>
            <div class="overflow-x-auto pb-4">
                <div id="comic-strip" class="flex gap-6 min-w-full bg-white p-8 rounded-2xl min-h-[220px] items-center">
                    <p id="placeholder-text" class="w-full text-center text-slate-300 font-bold uppercase tracking-[0.4em] py-10">No panels snapped yet...</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- Variables ---
        let scene, camera, renderer, controls, model, mixer;
        let clock = new THREE.Clock();
        let isPlaying = true;

        // --- Init 3D ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);

            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            camera.position.set(0, 0, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            animate();
        }

        // --- Loop ---
        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            if (mixer && isPlaying) mixer.update(delta);
            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        // --- Upload ---
        document.getElementById('modelUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-overlay').style.display = 'none';
            const url = URL.createObjectURL(file);
            new THREE.GLTFLoader().load(url, (gltf) => {
                if (model) scene.remove(model);
                model = gltf.scene;

                // Animation
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    mixer.clipAction(gltf.animations[0]).play();
                }

                // GIGANTIC SCALE FIX
                model.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const scale = 5 / Math.max(size.x, size.y, size.z);
                model.scale.set(scale, scale, scale);
                const center = box.getCenter(new THREE.Vector3());
                model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                
                scene.add(model);
            });
        });

        // --- UI ---
        function setBg(color) { scene.background = new THREE.Color(color); }

        function toggleAnim() {
            isPlaying = !isPlaying;
            document.getElementById('animBtn').innerText = isPlaying ? "⏸️ Pause Motion" : "▶️ Play Motion";
        }

        document.getElementById('dialogueInput').oninput = (e) => {
            const bubble = document.getElementById('speech-bubble');
            bubble.style.display = e.target.value ? 'block' : 'none';
            bubble.innerText = e.target.value;
        };

        function takeSnapshot() {
            const area = document.getElementById('capture-area');
            const strip = document.getElementById('comic-strip');
            const placeholder = document.getElementById('placeholder-text');
            
            html2canvas(area, { useCORS: true }).then(canvas => {
                if(placeholder) placeholder.remove();
                const wrapper = document.createElement('div');
                wrapper.className = "relative shrink-0";
                const img = document.createElement('img');
                img.src = canvas.toDataURL();
                img.className = "h-48 border-4 border-black shadow-xl block bg-slate-900";
                const delBtn = document.createElement('button');
                delBtn.innerHTML = "✕";
                delBtn.className = "absolute -top-2 -right-2 bg-red-600 text-white w-6 h-6 rounded-full text-[10px] font-bold shadow-lg";
                delBtn.onclick = () => wrapper.remove();
                wrapper.appendChild(img);
                wrapper.appendChild(delBtn);
                strip.appendChild(wrapper);
                strip.parentElement.scrollLeft = strip.parentElement.scrollWidth;
            });
        }

        function downloadStrip() {
            html2canvas(document.getElementById('comic-strip'), { backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'My_Comic_Strip.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        init();
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });
    </script>
</body>
</html>
