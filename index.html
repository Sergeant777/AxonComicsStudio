<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidovate Comic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #06b6d4; color: #06b6d4; }
        .tab-inactive { color: #64748b; border-bottom: 4px solid transparent; }
        .tab-inactive:hover { color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center h-16">
            <span class="font-black italic text-cyan-400 text-xl">KIDOVATE STUDIO</span>
            <div class="flex gap-6 font-bold text-sm uppercase h-full">
                <a href="index.html" class="tab-active flex items-center px-2 h-full">Studio</a>
                <a href="about.html" class="tab-inactive flex items-center px-2 h-full">About</a>
                <a href="updates.html" class="tab-inactive flex items-center px-2 h-full">Updates</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-5xl mx-auto w-full p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 relative bg-slate-900 rounded-3xl overflow-hidden border-4 border-slate-800 h-[500px]" id="capture-area">
                <div id="canvas-container" class="w-full h-full"></div>
                <div id="upload-overlay" class="absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center z-20">
                    <input type="file" id="modelUpload" accept=".glb" class="hidden">
                    <label for="modelUpload" class="bg-cyan-600 hover:bg-cyan-500 text-white font-black px-8 py-4 rounded-2xl cursor-pointer shadow-lg uppercase transition-all">
                        📁 Upload Character (.GLB)
                    </label>
                </div>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 flex flex-col gap-4">
                <button onclick="takePhoto()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg transition-all">📸 SNAP PHOTO</button>
                <p class="text-[10px] text-slate-500 text-center uppercase tracking-widest">Drag to rotate • Scroll to zoom</p>
            </div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls, model;
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            const container = document.getElementById('canvas-container');
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            container.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);
            animate();
        }

        document.getElementById('modelUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-overlay').style.display = 'none';
            const loader = new THREE.GLTFLoader();
            loader.load(URL.createObjectURL(file), (gltf) => {
                if (model) scene.remove(model);
                model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                let scale = 4.5 / (maxDim || 1); // Немного увеличили масштаб
                model.scale.set(scale, scale, scale);
                const center = box.getCenter(new THREE.Vector3());
                model.position.x = -center.x * scale;
                model.position.z = -center.z * scale;
                // ПРИЗЕМЛЕНИЕ: Ставим ноги на нижнюю часть экрана
                model.position.y = (-box.min.y * scale) - 2.2; 
                scene.add(model);
            });
        });

        function animate() { requestAnimationFrame(animate); if (controls) controls.update(); if (renderer) renderer.render(scene, camera); }
        function takePhoto() {
            html2canvas(document.getElementById('capture-area')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'kidovate_comic.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
        init();
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });
    </script>
</body>
</html>
