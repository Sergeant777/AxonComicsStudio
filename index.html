<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidovate Comic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .tab-active { border-bottom: 4px solid #06b6d4; color: #06b6d4; }
        .tab-inactive { color: #64748b; border-bottom: 4px solid transparent; }
        .tab-inactive:hover { color: #cbd5e1; }
        
        .comic-bubble {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: white; border: 4px solid black; border-radius: 30px;
            padding: 12px 20px; text-align: center; font-weight: 900;
            color: black; font-size: 1.1rem; text-transform: uppercase;
            box-shadow: 6px 6px 0px rgba(0,0,0,1); z-index: 50;
            display: none; max-width: 80%; cursor: move; user-select: none;
        }
        .comic-bubble::after {
            content: ''; position: absolute; bottom: -15px; left: 50%;
            border-width: 15px 15px 0 0; border-style: solid;
            border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center h-16">
            <span class="font-black italic text-cyan-400 text-xl uppercase tracking-tighter">KIDOVATE STUDIO</span>
            <div class="flex gap-6 font-bold text-sm uppercase h-full">
                <a href="index.html" class="tab-active flex items-center px-2 h-full transition-colors">Studio</a>
                <a href="about.html" class="tab-inactive flex items-center px-2 h-full transition-colors">About</a>
                <a href="updates.html" class="tab-inactive flex items-center px-2 h-full transition-colors">Updates</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-5xl mx-auto w-full p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 relative bg-slate-900 rounded-3xl overflow-hidden border-4 border-slate-800 h-[550px]" id="capture-area">
                <div id="speech-bubble" class="comic-bubble">HELLO!</div>
                <div id="canvas-container" class="w-full h-full"></div>
                
                <div id="upload-overlay" class="absolute inset-0 bg-slate-950/90 flex flex-col items-center justify-center z-[60]">
                    <input type="file" id="modelUpload" accept=".glb" class="hidden">
                    <label for="modelUpload" class="bg-cyan-600 hover:bg-cyan-500 text-white font-black px-10 py-5 rounded-2xl cursor-pointer shadow-lg uppercase transition-all text-lg">
                        📁 Upload Character (.GLB)
                    </label>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 flex flex-col gap-4 shadow-xl">
                    <div>
                        <label class="text-cyan-400 text-[10px] font-black uppercase mb-2 block tracking-widest">1. Dialogue</label>
                        <input type="text" id="bubbleInput" placeholder="Type here..." class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-white outline-none focus:border-cyan-500">
                    </div>

                    <div>
                        <label class="text-cyan-400 text-[10px] font-black uppercase mb-2 block tracking-widest">2. Scene</label>
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="changeBg(0x1e293b)" class="h-8 rounded bg-slate-700 border border-white/10"></button>
                            <button onclick="changeBg(0x064e3b)" class="h-8 rounded bg-emerald-900 border border-white/10"></button>
                            <button onclick="changeBg(0x450a0a)" class="h-8 rounded bg-red-950 border border-white/10"></button>
                            <button onclick="changeBg(0x0c4a6e)" class="h-8 rounded bg-sky-900 border border-white/10"></button>
                        </div>
                    </div>

                    <button onclick="snapPanel()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg transition-all text-lg active:scale-95">
                        📸 SNAP PANEL
                    </button>
                    <p class="text-[9px] text-slate-500 text-center uppercase font-bold italic">Drag bubble to move it!</p>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-slate-900 p-6 rounded-[32px] border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-4 px-2">
                <h3 class="font-black italic text-xl tracking-tighter uppercase">Comic Strip Gallery</h3>
                <button onclick="clearStrip()" class="text-[10px] font-bold text-slate-500 hover:text-red-400 uppercase tracking-widest">Clear All</button>
            </div>
            <div id="comic-strip" class="flex gap-4 overflow-x-auto pb-4 min-h-[160px]">
                <p id="empty-msg" class="text-slate-700 font-black uppercase text-xs m-auto italic">Gallery is empty...</p>
            </div>
        </div>
    </main>

    <script>
        let scene, camera, renderer, controls, model;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(0, 1, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            const container = document.getElementById('canvas-container');
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);
            animate();
        }

        document.getElementById('modelUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-overlay').style.display = 'none';
            const loader = new THREE.GLTFLoader();
            const url = URL.createObjectURL(file);

            loader.load(url, (gltf) => {
                if (model) scene.remove(model);
                model = gltf.scene;
                
                // Усиленный авто-скейл
                model.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                let scale = 5.0 / (maxDim || 1); 
                model.scale.set(scale, scale, scale);
                
                const center = box.getCenter(new THREE.Vector3());
                model.position.x = -center.x * scale;
                model.position.z = -center.z * scale;
                // ПРИЗЕМЛЕНИЕ: Опускаем ноги вниз
                model.position.y = (-box.min.y * scale) - 3.5; 
                
                scene.add(model);
                controls.target.set(0, 0, 0);
                controls.update();
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer) renderer.render(scene, camera);
        }

        // РЕЧЕВОЙ БАБЛ
        document.getElementById('bubbleInput').addEventListener('input', (e) => {
            const b = document.getElementById('speech-bubble');
            b.style.display = e.target.value ? 'block' : 'none';
            b.innerText = e.target.value;
        });

        // ПЕРЕМЕЩЕНИЕ БАБЛА МЫШКОЙ
        const bubble = document.getElementById('speech-bubble');
        let isDragging = false;
        let startX, startY, startL, startT;

        bubble.onmousedown = (e) => {
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
            startL = bubble.offsetLeft; startT = bubble.offsetTop;
            bubble.style.transform = 'none';
        };
        document.onmousemove = (e) => {
            if (!isDragging) return;
            bubble.style.left = (startL + (e.clientX - startX)) + 'px';
            bubble.style.top = (startT + (e.clientY - startY)) + 'px';
        };
        document.onmouseup = () => isDragging = false;

        function changeBg(color) { scene.background = new THREE.Color(color); }

        // СЪЕМКА ПАНЕЛИ
        function snapPanel() {
            const area = document.getElementById('capture-area');
            const gallery = document.getElementById('comic-strip');
            html2canvas(area).then(canvas => {
                const msg = document.getElementById('empty-msg');
                if (msg) msg.remove();
                const img = document.createElement('img');
                img.src = canvas.toDataURL();
                img.style.height = "150px";
                img.className = "rounded-lg border-2 border-black shrink-0 shadow-md";
                gallery.appendChild(img);
            });
        }

        function clearStrip() {
            document.getElementById('comic-strip').innerHTML = '<p id="empty-msg" class="text-slate-700 font-bold uppercase text-xs m-auto">Gallery is empty...</p>';
        }

        init();
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.offsetWidth / container.offsetHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.offsetWidth, container.offsetHeight);
        });
    </script>
</body>
</html>
