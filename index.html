<!DOCTYPE html>

    <title>Kidovate Comic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .comic-bubble {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            background: white; border: 4px solid black; border-radius: 30px;
            padding: 15px 30px; text-align: center; font-weight: 900;
            color: black; font-size: 1.2rem; text-transform: uppercase;
            box-shadow: 6px 6px 0px rgba(0,0,0,1); z-index: 15;
            max-width: 80%; display: none; word-wrap: break-word;
        }
    </style>
</head>

            <div class="flex items-center gap-2">
                <span class="text-2xl">🦸‍♂️</span>

        </div>

                            📁 Upload Character (.glb)
                        </label>
                        <p class="text-slate-500 text-[10px] mt-6 uppercase font-bold">Use the converted Mixamo file</p>
                    </div>
                </div>
